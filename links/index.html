<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9BCX6XPC5X"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-9BCX6XPC5X');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miles Gilbert | Links</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="icon" type="image/x-icon" href="https://media.milesgilbert.xyz/favicon-96x96.png">
</head>
<body>
    <div class="container">
        <header>
            <div class="breadcrumbs">
                <a href="/">Miles Gilbert</a><span> / </span><span>Links</span>
            </div>
        </header>

        <h1>Links</h1>

        <div id="links-list" style="margin-top: 32px;">
            <p id="loading-state" style="opacity: 0.5;">Loading...</p>
        </div>
    </div>

    <script>
        async function loadLinks() {
            const container = document.getElementById('links-list');
            try {
                const res = await fetch('/api/links');
                const links = await res.json();

                if (!links.length) {
                    container.innerHTML = '<p style="opacity: 0.5;">Nothing here yet.</p>';
                    return;
                }

                const list = document.createElement('div');
                list.className = 'design-list';

                links.forEach(link => {
                    const item = document.createElement('a');
                    item.href = link.url;
                    item.className = 'design-item';
                    item.target = '_blank';
                    item.rel = 'noopener noreferrer';
                    item.style.borderBottom = 'none';

                    if (link.thumbnail) {
                        const img = document.createElement('img');
                        img.src = link.thumbnail;
                        img.alt = link.title;
                        img.className = 'design-thumb';
                        item.appendChild(img);
                    }

                    const content = document.createElement('div');
                    content.className = 'design-content';
                    const title = document.createElement('h2');
                    title.textContent = link.title;
                    content.appendChild(title);
                    item.appendChild(content);

                    list.appendChild(item);
                });

                container.innerHTML = '';
                container.appendChild(list);
            } catch (err) {
                container.innerHTML = '<p style="opacity: 0.5;">Failed to load links.</p>';
            }
        }

        loadLinks();
    </script>
</body>
</html>
